# =============================================================================
# config.yaml — central configuration for the compass-needle lattice
# simulator (compassV2_2.py) and its companion sweep/analysis scripts.
#
# This file is a mechanical extraction of previously hardcoded literals.
# Every value here reproduces the exact default that used to be written
# directly in source (see the "source" comment on each key). No defaults
# were changed as part of this extraction.
#
# Loaded via sim_config.py::load_config(). CLI flags still override these
# values at runtime exactly as before -- only the *default* now comes from
# this file instead of from a Python literal.
#
# Sentinel "None"/"auto" defaults (e.g. --moment, --seed, --B_ext, which mean
# "derive this automatically") are intentionally NOT included here: they are
# not tunable numeric values, so moving them into YAML would add indirection
# without benefit. They remain literal `None` in each script's argparse.
# =============================================================================

physics:
  # ---------------------------------------------------------------------
  # Universal physical constants (shared by every script that needs them;
  # already shared at the source level via `cs.MU0_OVER_4PI` imports, so
  # collapsing them to one key here changes nothing).
  # ---------------------------------------------------------------------
  constants:
    mu0_over_4pi: 1.0e-7          # T*m/A -- mu0/(4*pi); compassV2_2.py:118

  # ---------------------------------------------------------------------
  # compassV2_2.py -- canonical engine. Module constants (compassV2_2.py:118-130)
  # and the physics-flavored argparse group defaults (build_parser(),
  # compassV2_2.py:1581-1649).
  # ---------------------------------------------------------------------
  compass_engine:
    steel_density: 7850.0            # kg/m^3, needle blade material density
    steel_ms_saturation: 1.59e+6      # A/m, saturation magnetization (~ Bsat=2.0T/mu0)
    center_distance: 0.013           # m, default pivot-to-pivot spacing (R = half this)
    needle_len: 0.010                # m, default blade length (rhombus long diagonal)
    needle_width: 0.003              # m, default blade width (rhombus short diagonal)
    needle_thickness: 0.0004         # m, default blade thickness
    needle_frac_legacy: 0.80         # dimensionless, legacy blade-length fraction of 2R
    use_legacy_size_from_R: 0        # 0/1, use needle_frac*2R instead of explicit needle_len/width
    legacy_width_to_length_ratio: 0.22  # dimensionless, needle_width = ratio * needle_len when use_legacy_size_from_R=1 (a real, distinct ratio from physics.needle_geometry's default -- see docs/AUDIT.md P2 item 10)
    damping: 5.0e-8                  # N*m*s/rad, viscous rotational damping coefficient b
    damping_noise: 0.0               # fraction, relative per-needle damping variation
    pivot_radius: 0.0                # m
    pivot_thickness: 0.0             # m
    pivot_density: 8500.0            # kg/m^3
    # Field protocol (physical excitation applied to the lattice)
    field_mode: static               # static|hysteresis|forc|sine|step_up|step_pos|step_down|step_neg|pulse|demag_rot|demag_linear
    B_max_factor: 8.0                # dimensionless, B_ext = factor * B_ref when B_ext omitted
    phi_ext_deg: 0.0                 # deg, applied field direction relative to +x
    field_freq: 1.0                  # Hz, sine-mode field frequency
    field_delay: 0.0                 # s, delay before step/pulse protocols activate
    hyst_spacing: linear             # linear|log, time-warping of the hysteresis ramp
    hyst_log_k: 5.0                  # dimensionless, log-spacing concentration for hysteresis ramp
    t_sim: 2.0                       # s, total simulated time (ignored for FORC/demag modes)
    noise: 1.5                       # rad, initial angular noise amplitude
    forc:
      n_curves: 30                   # count, number of minor reversal curves
      t_sat: 0.05                    # s, hold time at +saturation before each curve
      t_ramp_down: 0.10              # s, ramp-down time to Br (used only if forc_rate unset)
      t_ramp_up: 0.20                # s, ramp-up time back to +Bmax (used only if forc_rate unset)
    demag:
      freq: 2.0                      # Hz, demag field rotation/oscillation frequency
      cycles: 20                     # count, number of decay cycles
      t_relax_after: 2.0             # s, extra relaxation time appended after demag completes

  # ---------------------------------------------------------------------
  # calc_defaults_temp.py -- standalone scratch calculator. Kept as its own
  # profile: its needle_thickness (0.26e-3, "real small needle") differs
  # from compass_engine's (0.0004, "LAW3M large needle") on purpose -- these
  # describe two different physical apparatuses, not the same constant.
  # ---------------------------------------------------------------------
  calc_defaults_temp:
    density: 7850.0                  # kg/m^3
    thickness: 0.26e-3               # m
    needle_len: 10.0e-3                # m
    needle_width: 3.0e-3                # m
    pivot_radius: 1.0e-3                # m
    pivot_thickness: 2.0e-3            # m
    pivot_density: 8500.0            # kg/m^3
    Ms: 1.59e+6                        # A/m

  # ---------------------------------------------------------------------
  # damping_sweep.py / damping_sweepV02.py / damping_sweepV03.py -- these
  # three files share one byte-identical argparse block (confirmed by diff),
  # so they share one config profile here.
  # ---------------------------------------------------------------------
  damping_sweep:
    R_default: 0.0075                # m, "real small needle" apparatus
    needle_frac: 0.6666666666666666  # dimensionless, 2/3
    needle_thickness: 0.26e-3        # m
    steel_density: 7850.0            # kg/m^3
    pivot_radius: 1.0e-3              # m
    pivot_thickness: 2.0e-3          # m
    pivot_density: 8500.0            # kg/m^3
    B_max_factor: 8.0                # dimensionless
    noise: 1.5                       # rad
    cutoff_default: 3.5              # multiples of r_nn = 2R (units of r_nn, NOT metres)

  # ---------------------------------------------------------------------
  # sweep_damping_hysteresis.py -- its own independent profile (module
  # constants at top of file). Non-functional today (see docs/AUDIT.md B3);
  # values extracted as-is without fixing the surrounding bugs.
  # ---------------------------------------------------------------------
  sweep_damping_hysteresis:
    R_default: 0.0075                # m
    needle_frac: 0.6666666666666666  # dimensionless, 2/3
    needle_thickness: 0.26e-3        # m
    steel_density: 7850.0            # kg/m^3
    pivot_radius: 1.0e-3              # m, inline literal in _compute_derived_params
    pivot_thickness: 2.0e-3          # m, inline literal in _compute_derived_params
    B_max_factor: 8.0                # dimensionless
    noise_init: 1.5                  # rad

  # ---------------------------------------------------------------------
  # compass_generate_images.py -- fallback geometry guesses used only when
  # an older NPZ/metadata file is missing r_nn/needle_len/needle_width.
  # The width/length fallback ratio itself is compass_engine's legacy ratio
  # (physics.compass_engine.legacy_width_to_length_ratio), not duplicated
  # here -- see docs/AUDIT.md P2 item 10.
  # ---------------------------------------------------------------------
  compass_generate_images:
    r_nn_fallback: 1.0                          # m, used when r_nn missing entirely
    needle_len_to_r_nn_fallback_ratio: 0.8       # dimensionless, needle_len fallback = ratio * r_nn

  # ---------------------------------------------------------------------
  # The single canonical needle width/length ratio (see docs/AUDIT.md P2
  # item 10). Used by damping_sweep.py/V02/V03 and sweep_damping_hysteresis.py
  # to derive needle_width from needle_len. NOT the same as
  # compass_engine.legacy_width_to_length_ratio (0.22), which is a real,
  # separate ratio specific to the --use_legacy_size_from_R code path.
  # ---------------------------------------------------------------------
  needle_geometry:
    default_width_to_length_ratio: 0.30  # dimensionless, needle_width = needle_len * ratio

  # ---------------------------------------------------------------------
  # Needle-drawing visual proportions shared verbatim across
  # compassV2_2.py::_draw_lattice_png, compass_generate_images.py, and
  # plot_default_geometries_clean.py (identical literals in all three).
  # ---------------------------------------------------------------------
  needle_render:
    colors:
      blue_north: "#0017B8"
      white_south: "#F2F2F2"
      edge: "#4D4D4D"
      pivot: "#777777"
      background: "white"
    pivot_radius_frac: 0.085         # fraction of r_nn, outer pivot circle
    pivot_inner_radius_frac: 0.025   # fraction of r_nn, inner pivot circle

numerics:
  # ---------------------------------------------------------------------
  # compassV2_2.py -- integration/grid/tolerance defaults.
  # ---------------------------------------------------------------------
  compass_engine:
    grid:
      geometry: square                # square|triangular|honeycomb
      N: 16                           # rows (or nominal honeycomb height)
      M: 16                           # columns (or nominal honeycomb width)
      cutoff_shells: 3.5               # multiples of r_nn, dipolar interaction cutoff
      n_images: 1                      # count, periodic images per direction
      tensor_mem_limit_gb: 6.0         # GB, memory guard on the K x K dipolar tensor
      float32: false                   # use float32 tensor/state instead of float64
      pbc: false                       # periodic boundary conditions
    time:
      dt_factor: 0.04                  # dimensionless, dt/T0
      log_every: 10                    # steps, CSV row written every N integration steps
    tolerances:
      flip_angle_deg: 90.0              # deg, rest-angle displacement threshold (flip_angle channel)
      flip_band_deg: 30.0               # deg, Schmitt dead-band half-width (flip_field channel)
      flip_dwell_T0: 0.5                 # multiples of T0, dwell time to commit a flip
      flip_settle_frac: 0.05             # fraction of omega0, |omega| settling threshold
      dt_guard_alpha: 0.35               # dimensionless, stability-monitor threshold
      domain_tol_deg: 15.0               # deg, angular tolerance for domain clustering

  # ---------------------------------------------------------------------
  # damping_sweep.py / V02 / V03 -- shared campaign-grid parameters.
  # ---------------------------------------------------------------------
  damping_sweep:
    grid_n: 30                        # needles/side, N=M lattice size
    n_seeds: 5                        # count, noise seeds per (geometry, damping)
    n_dampings: 8                     # count, damping (Q) grid points
    Q_min: 0.05                       # dimensionless, overdamped end of Q grid
    Q_max: 15.0                       # dimensionless, underdamped end of Q grid
    t_sim_periods: 40.0               # multiples of T0, total hysteresis-cycle duration
    dt_factor: 0.05                   # dimensionless, dt/T0
    domain_tol: 15.0                  # deg
    forc_n_curves: 20                 # count
    quick_test:                       # values substituted when --quick_test 1
      n_seeds: 1
      n_dampings: 3
      t_sim_periods: 8.0
      grid_n: 12
      forc_n_curves: 3

  # ---------------------------------------------------------------------
  # sweep_damping_hysteresis.py
  # ---------------------------------------------------------------------
  sweep_damping_hysteresis:
    N_grid: 30                        # needles/side
    M_grid: 30                        # needles/side
    n_damping: 8                      # count, damping (Q) grid points
    Q_min: 0.05                       # dimensionless
    Q_max: 15.0                       # dimensionless
    cutoff: 3.5                       # multiples of r_nn
    dt_factor: 0.04                   # dimensionless, dt/T0
    t_sim_in_T0: 60.0                 # multiples of T0, total hysteresis-cycle duration

  # ---------------------------------------------------------------------
  # damping_sweep_analysis.py -- post-processing thresholds.
  # ---------------------------------------------------------------------
  damping_sweep_analysis:
    mad_threshold: 4.0                # multiples of MAD, dM/dB avalanche-detection threshold

  # ---------------------------------------------------------------------
  # avalanche_processor.py -- spatio-temporal clustering thresholds.
  # ---------------------------------------------------------------------
  avalanche_processor:
    t_link_T0: "1,2,4"                # comma list, causal link windows in units of T0
    r_link_rnn: 1.05                  # multiples of r_nn, spatial link radius
    min_tail: 100                     # count, minimum tail events for an exponent fit

  # ---------------------------------------------------------------------
  # Rendering resolution (shared by all three plotting code paths).
  # ---------------------------------------------------------------------
  rendering:
    dpi_default: 300                  # dots/inch
    figsize_default: 6.0               # inches, square figure size

run:
  # ---------------------------------------------------------------------
  # compassV2_2.py -- output/execution defaults.
  # ---------------------------------------------------------------------
  compass_engine:
    out_dir: compassV2_output
    tag: null                         # auto-built from geometry/mode/N/M/seed if unset
    seed: null                        # time-derived if unset
    use_gpu: false
    progress: false
    verbose: false
    make_plot: false
    event_log: false
    dt_guard_substep: false
    png_dpi: 300                      # dots/inch
    png_transparent: false
    png_with_axes: false
    png_no_panel_titles: false

  # ---------------------------------------------------------------------
  # damping_sweep.py / V02 / V03
  # ---------------------------------------------------------------------
  damping_sweep:
    geometries: "square,triangular,honeycomb"
    pbc: 0
    use_gpu: 0
    damping_noise: 0.0
    skip_relax_stage: 0
    skip_forc_stage: 0
    quick_test: 0
    n_workers: 1                       # V02/V03 only
    resume: 0                          # V02/V03 only

  # ---------------------------------------------------------------------
  # sweep_damping_hysteresis.py
  # ---------------------------------------------------------------------
  sweep_damping_hysteresis:
    seeds: [1, 2, 3, 4, 5]
    geometries: ["square", "triangular", "honeycomb"]
    gpu: 0
    only_index: null

  # ---------------------------------------------------------------------
  # avalanche_processor.py
  # ---------------------------------------------------------------------
  avalanche_processor:
    out_dir: avalanche_analysis
    channels: "field,angle"
    group_by: "geometry,field_mode,Q"
    make_plot: false

  # ---------------------------------------------------------------------
  # compass_generate_images.py
  # ---------------------------------------------------------------------
  compass_generate_images:
    run_dir: "."
    recursive: false
    transparent: false
    with_axes: false
    no_panel_titles: false
    verbose: false

  # ---------------------------------------------------------------------
  # plot_default_geometries_clean.py
  # ---------------------------------------------------------------------
  plot_default_geometries_clean:
    input_dir: geometry_figures
    input_file: null
    output_file: null
    output_dir: null
    single: false
    tag_suffix: "_default"
    transparent: false

  # ---------------------------------------------------------------------
  # damping_sweep_analysis.py -- plot colors/markers by geometry.
  # ---------------------------------------------------------------------
  damping_sweep_analysis:
    geometry_colors:
      square: "#2E86AB"
      triangular: "#E94560"
      honeycomb: "#3CB371"
    geometry_markers:
      square: "o"
      triangular: "s"
      honeycomb: "^"
